<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DrillGen — Log In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #16a34a;
  --green-light: #4ade80;
  --green-pale: #f0fdf4;
  --green-dark: #14532d;
  --pitch: #0c1a0e;
  --white: #ffffff;
  --off: #f8faf8;
  --slate: #0f172a;
  --mid: #334155;
  --light: #64748b;
  --border: #e2e8f0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--pitch); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; }

.bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px); background-size: 60px 60px; }
.bg-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(22,163,74,0.12) 0%, transparent 65%); top: -100px; right: -100px; pointer-events: none; }

.card { position: relative; z-index: 2; background: white; border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }

.logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 32px; text-decoration: none; }
.logo-wordmark { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; display: flex; flex-direction: column; line-height: 1; }
.logo-drill { color: #0f172a; }
.logo-gen { color: #16a34a; }

.tabs { display: flex; background: var(--off); border-radius: 12px; padding: 4px; margin-bottom: 28px; gap: 4px; }
.tab { flex: 1; padding: 10px; border: none; background: none; border-radius: 9px; font-size: 14px; font-weight: 600; color: var(--light); cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
.tab.active { background: white; color: var(--slate); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
.form-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-family: 'Inter', sans-serif; color: var(--slate); outline: none; transition: border-color 0.2s; background: white; }
.form-input:focus { border-color: var(--green); }

.btn-submit { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; box-shadow: 0 4px 16px rgba(22,163,74,0.3); margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-submit:hover:not(:disabled) { background: #15803d; transform: translateY(-1px); }
.btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 12px 16px; color: #dc2626; font-size: 13px; margin-top: 12px; display: none; line-height: 1.5; }
.success-box { background: var(--green-pale); border: 1px solid rgba(22,163,74,0.2); border-radius: 10px; padding: 12px 16px; color: var(--green-dark); font-size: 13px; margin-top: 12px; display: none; line-height: 1.5; }

.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-size: 12px; color: var(--light); font-weight: 500; }

.trial-note { text-align: center; margin-top: 20px; font-size: 13px; color: var(--light); line-height: 1.6; }
.trial-note strong { color: var(--green); }

.back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--light); text-decoration: none; transition: color 0.2s; }
.back-link:hover { color: var(--green); }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="card">
  <a href="index.html" class="logo">
    <svg width="38" height="32" viewBox="0 0 38 32" fill="none">
      <rect x="0" y="4" width="26" height="5" rx="2.5" fill="#16a34a"/>
      <rect x="0" y="13" width="20" height="5" rx="2.5" fill="#16a34a" opacity="0.75"/>
      <rect x="0" y="22" width="14" height="5" rx="2.5" fill="#16a34a" opacity="0.5"/>
      <circle cx="32" cy="24" r="6" fill="#0f172a" stroke="#16a34a" stroke-width="1.5"/>
      <path d="M32 19.5 L33.2 22.5 L32 23.5 L30.8 22.5 Z" fill="#16a34a" opacity="0.7"/>
      <path d="M28.5 22.5 L30.8 22.5 L30 25 L28 24.5 Z" fill="#16a34a" opacity="0.5"/>
      <path d="M35.5 22.5 L33.2 22.5 L34 25 L36 24.5 Z" fill="#16a34a" opacity="0.5"/>
    </svg>
    <div class="logo-wordmark">
      <span class="logo-drill">Drill</span>
      <span class="logo-gen">Gen</span>
    </div>
  </a>

  <div class="tabs">
    <button class="tab active" id="loginTab" onclick="showTab('login')">Log In</button>
    <button class="tab" id="signupTab" onclick="showTab('signup')">Start Free Trial</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input class="form-input" type="email" id="loginEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-input" type="password" id="loginPassword" placeholder="Your password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-submit" id="loginBtn" onclick="login()">
      <span class="spinner" id="loginSpinner"></span>
      <span id="loginBtnText">Log In</span>
    </button>
    <div class="error-box" id="loginError"></div>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" style="display:none">
    <div class="form-group">
      <label>Your Name</label>
      <input class="form-input" type="text" id="signupName" placeholder="e.g. Joseph">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input class="form-input" type="email" id="signupEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-input" type="password" id="signupPassword" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')signup()">
    </div>
    <button class="btn-submit" id="signupBtn" onclick="signup()">
      <span class="spinner" id="signupSpinner"></span>
      <span id="signupBtnText">Start Free 30-Day Trial</span>
    </button>
    <div class="error-box" id="signupError"></div>
    <div class="success-box" id="signupSuccess"></div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">what you get</div>
      <div class="divider-line"></div>
    </div>

    <div class="trial-note">
      <strong>30 days completely free.</strong> No credit card needed.<br>
      Full access to Session Planner, Drill Generator and Match Day builder.
    </div>
  </div>

  <a href="index.html" class="back-link">← Back to DrillGen.app</a>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDCEWvKhexYsJQqRKkZgTmedLaAPdrKrgA",
    authDomain: "drillgen-2f910.firebaseapp.com",
    projectId: "drillgen-2f910",
    storageBucket: "drillgen-2f910.firebasestorage.app",
    messagingSenderId: "406136862852",
    appId: "1:406136862852:web:95bdb0ef7fcae2f050ead1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // If already logged in, redirect to session planner
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'session-planner.html';
  });

  window.showTab = function(tab) {
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('loginTab').classList.toggle('active', tab === 'login');
    document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
  }

  window.login = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    const spinner = document.getElementById('loginSpinner');
    const btnText = document.getElementById('loginBtnText');
    const errorBox = document.getElementById('loginError');

    if (!email || !password) { showError('loginError', 'Please enter your email and password.'); return; }

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Logging in...';
    errorBox.style.display = 'none';

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'session-planner.html';
    } catch (err) {
      showError('loginError', getFriendlyError(err.code));
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Log In';
    }
  }

  window.signup = async function() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const btn = document.getElementById('signupBtn');
    const spinner = document.getElementById('signupSpinner');
    const btnText = document.getElementById('signupBtnText');

    if (!name) { showError('signupError', 'Please enter your name.'); return; }
    if (!email) { showError('signupError', 'Please enter your email.'); return; }
    if (password.length < 6) { showError('signupError', 'Password must be at least 6 characters.'); return; }

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Creating account...';
    document.getElementById('signupError').style.display = 'none';

    try {
      const result = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(result.user, { displayName: name });
      window.location.href = 'session-planner.html';
    } catch (err) {
      showError('signupError', getFriendlyError(err.code));
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Start Free 30-Day Trial';
    }
  }

  function showError(id, msg) {
    const box = document.getElementById(id);
    box.textContent = msg;
    box.style.display = 'block';
  }

  function getFriendlyError(code) {
    const errors = {
      'auth/user-not-found': 'No account found with that email. Try signing up.',
      'auth/wrong-password': 'Incorrect password. Please try again.',
      'auth/email-already-in-use': 'An account with this email already exists. Try logging in.',
      'auth/weak-password': 'Password must be at least 6 characters.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/too-many-requests': 'Too many attempts. Please try again in a few minutes.',
      'auth/invalid-credential': 'Incorrect email or password. Please try again.',
    };
    return errors[code] || 'Something went wrong. Please try again.';
  }
</script>
</body>
</html>
